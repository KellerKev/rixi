[workspace]
channels = ["conda-forge"]
name = "rixi-agent"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
# Run the local inference backend (runs as a remote task payload)
start = "python inference_server.py"
# Run the API-compatibility proxy
proxy = "python proxy.py"
# Run the test suite
test = "pytest tests/"

[dependencies]
python = ">=3.13.3,<3.14"
flask = ">=3.1.0,<4"
lz4 = ">=4.4.4,<5"
requests = ">=2.32.3,<3"
tqdm = ">=4.67.1,<5"
tomli = ">=2.2.1,<3"
pyjwt = ">=2.10.1,<3"
cryptography = ">=44.0.3,<45"
transformers = ">=4.52.1,<5"
pytorch = ">=2.7.0,<3"
accelerate = ">=1.9.0,<2"
python-multipart = ">=0.0.20,<0.0.21"
pytest = ">=8"

[pypi-dependencies]
crewai = "*"
#mindsdb-cli= "*"
