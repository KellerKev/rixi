[workspace]
channels = ["conda-forge"]
name = "rixi-agent"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
start = "python inference_server.py"
# Main HTTP service task (demo)
http-service = "python examples/main.py"

# Simple HTTP server only (no proxy)
http-server = "python -c 'import sys; sys.path.insert(0, \"examples\"); from main import run_simple_http_server; run_simple_http_server()'"

# Flask variant (if flask is installed)
flask-service = {  cmd = "python examples/flask_service.py" }

# Run the test suite
test = "pytest tests/"

# FastAPI variant (if fastapi is installed)
fastapi-service = { depends-on = ["install-fastapi"], cmd = "python fastapi_service.py" }

[tasks.install-flask]
cmd = "pip install flask"

[tasks.install-fastapi]
cmd = "pip install fastapi uvicorn"

