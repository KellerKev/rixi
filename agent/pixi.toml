[workspace]
channels = ["conda-forge"]
name = "rixi-agent"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
# Run the agent (single entry point; defaults to agent_config.example.yaml)
agent = "python start_agent.py"
# Run the test suite
test = "pytest tests/"

[dependencies]
python = ">=3.10,<3.13"
requests = ">=2.32.3,<3"
tomli = ">=2.2.1,<3"
pyyaml = ">=6"
cryptography = ">=44.0.3,<45"
pytest = ">=8"

[pypi-dependencies]
crewai = "*"
