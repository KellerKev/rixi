[project]
name = "rixi-inference-server"
version = "0.1.0"
description = "RIXI inference backend (HuggingFace transformers or Ollama) run as a remote task payload"
authors = ["Kevin Keller <kellerkev@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.10"
requests = ">=2.32"
transformers = ">=4.52"
pytorch = ">=2.7"
accelerate = ">=1.9"

[tasks]
start = "python inference_server.py"
